name: Build and deploy to MonsterASP.NET

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish --configuration Release --output publish --runtime win-x86 --self-contained false

      - name: Set connection string
        run: |
          $json = Get-Content publish/appsettings.json | ConvertFrom-Json
          $json.ConnectionStrings.SqlServer = "${{ secrets.SQLSERVER_CONN }}"
          $json.Discord.BotToken = "${{ secrets.DISCORD_BOT_TOKEN }}"
          $json.Discord.ChannelId = "${{ secrets.DISCORD_CHANNEL_ID }}"
          $json.Discord.GuildId = "${{ secrets.DISCORD_GUILD_ID }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content publish/appsettings.json
        shell: pwsh

      - name: Deploy to MonsterASP.NET
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: publish
